<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SquareBrowser 10-inch Tablet Screenshot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .device {
      width: 900px;
      height: 1350px;
      background: #000;
      border-radius: 25px;
      padding: 20px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
      position: relative;
    }

    .screen {
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 15px;
      overflow: hidden;
      position: relative;
    }

    /* Status bar */
    .status-bar {
      height: 30px;
      background: #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 25px;
      color: white;
      font-size: 14px;
    }

    /* Main browser area */
    .browser-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* URL Bar */
    .url-bar {
      background: #f5f5f5;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 1px solid #e0e0e0;
    }

    .url-bar-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }

    .url-bar-btn svg {
      width: 24px;
      height: 24px;
    }

    .url-input {
      flex: 1;
      background: #e0e0e0;
      border-radius: 25px;
      padding: 12px 25px;
      font-size: 16px;
      color: #333;
    }

    /* WebView content */
    .webview {
      flex: 1;
      background: linear-gradient(180deg, #2196F3 0%, #1976D2 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .webview-icon {
      width: 160px;
      height: 160px;
      background: white;
      border-radius: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 35px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    }

    .webview-icon svg {
      width: 90px;
      height: 90px;
      fill: #2196F3;
    }

    .webview-title {
      font-size: 44px;
      font-weight: bold;
      color: white;
      margin-bottom: 15px;
    }

    .webview-subtitle {
      font-size: 24px;
      color: rgba(255,255,255,0.85);
      text-align: center;
      max-width: 500px;
      line-height: 1.5;
    }

    /* Features list in webview */
    .features-list {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      margin-top: 40px;
      max-width: 600px;
    }

    .feature-tag {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 20px;
      color: white;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .feature-tag svg {
      width: 16px;
      height: 16px;
    }

    /* Bottom nav */
    .bottom-nav {
      height: 70px;
      background: #fff;
      border-top: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #2196F3;
    }

    .nav-item svg {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }

    .nav-item span {
      font-size: 12px;
      font-weight: 500;
    }

    /* Tab badge */
    .tab-badge {
      position: relative;
    }

    .tab-badge::after {
      content: '3';
      position: absolute;
      top: -6px;
      right: -6px;
      background: #2196F3;
      color: white;
      font-size: 11px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .info {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
