<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SquareBrowser Feature Graphic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .graphic {
      width: 1024px;
      height: 500px;
      background: linear-gradient(135deg, #1a237e 0%, #0d47a1 50%, #01579b 100%);
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    /* Background patterns */
    .graphic::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255,255,255,0.03);
      border-radius: 50%;
      top: -100px;
      right: -100px;
    }

    .graphic::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(33, 150, 243, 0.1);
      border-radius: 50%;
      bottom: -50px;
      left: -50px;
    }

    /* Shield icon background */
    .shield-bg {
      position: absolute;
      right: -50px;
      top: 50%;
      transform: translateY(-50%);
      width: 500px;
      height: 500px;
      opacity: 0.05;
    }

    .shield-bg svg {
      width: 100%;
      height: 100%;
      fill: white;
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      padding: 60px 80px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .logo img {
      width: 80px;
      height: 80px;
    }

    .app-name {
      font-size: 48px;
      font-weight: bold;
      color: white;
      letter-spacing: -1px;
    }

    .tagline {
      font-size: 28px;
      color: rgba(255,255,255,0.9);
      margin-bottom: 40px;
      font-weight: 300;
    }

    .features {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .feature {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 25px;
      color: white;
      font-size: 16px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .feature svg {
      width: 18px;
      height: 18px;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: white;
      color: #0d47a1;
      padding: 15px 30px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      align-self: flex-start;
    }

    /* Phone mockup */
    .phone {
      position: absolute;
      right: 80px;
      top: 50%;
      transform: translateY(-50%);
      width: 200px;
      height: 380px;
      background: #1a1a1a;
      border-radius: 30px;
      padding: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      position: relative;
    }

    .phone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 25px;
      background: #1a1a1a;
      border-radius: 0 0 15px 15px;
      z-index: 5;
    }

    .url-bar {
      background: #f5f5f5;
      padding: 35px 10px 10px;
      border-bottom: 1px solid #e0e0e0;
    }

    .url-bar-text {
      background: white;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 11px;
      color: #666;
      text-align: center;
    }

    .web-content {
      padding: 15px;
    }

    .web-content-line {
      background: #f0f0f0;
      height: 8px;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    .web-content-line:nth-child(2) { width: 90%; }
    .web-content-line:nth-child(3) { width: 70%; }
    .web-content-line:nth-child(4) { width: 85%; }

    .privacy-badge {
      position: absolute;
      bottom: 30px;
      right: 30px;
      background: rgba(76, 175, 80, 0.9);
      backdrop-filter: blur(10px);
      padding: 15px 25px;
      border-radius: 15px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 20;
    }

    .privacy-badge svg {
      width: 24px;
      height: 24px;
    }

    /* Download hint */
    .download-hint {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 14px;
    }

    .download-hint a {
      color: #2196F3;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div>
    <div class="graphic">
      <!-- Background shield -->
      <div class="shield-bg">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4m0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8Z"/></svg>
      </div>

      <div class="content">
        <div class="logo">
          <img src="icon.png" alt="SquareBrowser" onerror="this.style.display='none'">
          <div class="app-name">SquareBrowser</div>
        </div>

        <div class="tagline">Privacy-First Mobile Browser</div>

        <div class="features">
          <div class="feature">
            <svg viewBox="0 0 24 24" fill="white"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4Z"/></svg>
            No Tracking
          </div>
          <div class="feature">
            <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            100% Local
          </div>
          <div class="feature">
            <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            Ad Blocking
          </div>
          <div class="feature">
            <svg viewBox="0 0 24 24" fill="white"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zM9 17H7v-2h2v2zm0-4H7v-2h2v2zm0-4H7V7h2v2zm4 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2zm4 8h-2v-2h2v2zm0-4h-2v-2h2v2zm0-4h-2V7h2v2z"/></svg>
            Dark Mode
          </div>
        </div>

        <div class="cta">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.92 20.16,13.19L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z" />
          </svg>
          Get it on Google Play
        </div>
      </div>

      <!-- Phone mockup -->
      <div class="phone">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <div class="url-bar">
            <div class="url-bar-text">squarebrowser.com</div>
          </div>
          <div class="web-content">
            <div class="web-content-line"></div>
            <div class="web-content-line"></div>
            <div class="web-content-line"></div>
          </div>
        </div>
      </div>

      <!-- Privacy badge -->
      <div class="privacy-badge">
        <svg viewBox="0 0 24 24" fill="white"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4m0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8Z"/></svg>
        Open Source
      </div>
    </div>

    <div class="download-hint">
      Right-click the graphic and "Save image as" or take a screenshot<br>
      Size: 1024 x 500 pixels (Google Play Store specification)
    </div>
  </div>
</body>
</html>
